services:
  - type: web
    name: memoora-api
    env: node
    plan: starter
    buildCommand: npm ci --only=production
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: MY_PHONE_NUMBER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: API_KEY
        sync: false
      - key: API_KEYS
        sync: false
      - key: BLOCKED_NUMBERS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RECORDINGS_PATH
        value: ./recordings
      - key: MAX_RECORDING_DURATION
        value: 120
      - key: MAX_CALLS_PER_HOUR
        value: 10
      - key: MAX_REQUESTS_PER_HOUR
        value: 100
    healthCheckPath: /health
    autoDeploy: true 